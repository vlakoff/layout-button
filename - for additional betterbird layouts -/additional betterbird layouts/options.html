<!DOCTYPE html>
<html>

<head>
	<script type="module" src="options.js" defer></script>
	<link rel="stylesheet" href="options.css" />
</head>

<body>
	<div id="viewSelectors">
		<div>Select which layout you want to skip when cycling through</div>
		<div>Useful if you only switch between two layouts</div>
		<small>Select none to cycle through them all</small>
		<div>
			<label>
				<input id="none" type="radio" value="none" name="skip" />
				None
			</label>
		</div>
		<div>
			<label>
				<input id="standard" type="radio" value="standard" name="skip" />
				Standard
			</label>
		</div>
		<div>
			<label>
				<input id="wide" type="radio" value="wide" name="skip" />
				Wide
			</label>
		</div>
		<div>
			<label>
				<input id="vertical" type="radio" value="vertical" name="skip" />
				Vertical
			</label>
		</div>
	</div>

	<div id="betterbirdOnlyOption" hidden>
		<div>Betterbird-only option</div>
		<div>
			<label>
				<input id="bbFeature" type="checkbox" name="bbFeature" />
				Enable Betterbird-exclusive feature
			</label>
		</div>
	</div>
</body>

</html>
